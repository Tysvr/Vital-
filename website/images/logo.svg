<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B6CB0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Фон -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" stroke="#1a4a7a" stroke-width="3"/>
  <!-- Стилизованный человечек (движение/спорт) -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- Голова -->
    <circle cx="100" cy="55" r="18" fill="#FFFFFF" stroke="none"/>
    <!-- Тело -->
    <line x1="100" y1="73" x2="100" y2="115" stroke-width="8"/>
    <!-- Руки (в движении) -->
    <path d="M100 80 Q125 70 140 55" stroke-width="7"/>
    <path d="M100 80 Q75 70 60 85" stroke-width="7"/>
    <!-- Ноги -->
    <path d="M100 115 Q115 140 130 155" stroke-width="7"/>
    <path d="M100 115 Q85 140 70 145" stroke-width="7"/>
  </g>
  <!-- Сердце (здоровье) -->
  <g fill="#FFFFFF" stroke="none">
    <path d="M100 95 C95 85, 80 85, 80 98 C80 108, 100 125, 100 125 C100 125, 120 108, 120 98 C120 85, 105 85, 100 95 Z" opacity="0.95"/>
  </g>
  <!-- Маленькая молния в сердце (энергия/жизнь) -->
  <g fill="none" stroke="#2B6CB0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
    <polyline points="96,105 100,98 97,98 103,90 100,90 104,82"/>
  </g>
  <!-- Текст ВИТАЛЬ -->
  <text x="100" y="182" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="3">ВИТАЛЬ</text>
</svg>